<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container bg-light mt-5 p-5 ">
        <h1>📝Member Sign-up</h1>

        <hr>

        <h2 class="mt-4"> Student Details:</h2>
            <label for="Fname">Full Name:</label>
            <input type="text">
        
        <h2 class="mt-4">Ticket Selection:</h2>
            <label for="TickQuantity" id="ticketQTY">Ticket Quantity (PHP 250 Each):</label>
            <input type="number" value="0" min="0">
        
        <h3 class="mt-4">Payment Details</h3>
            <label for="SubTotal" class="mt-3" id="subTotal">Sub Total:</label>
            <input type="number" readonly> <br>

            <label for="AdminFee" class="mt-3" id="ADMIN_FEE">Admin Fee:</label>
            <input type="number" value="50"> <br>

            <hr>

            <label for="Total" class="mt-3" id="totalPrice">Total:</label>
            <input type="number" readonly> <br>

            <button type="button" class="btn-primary mt-3" onclick="seePayment()">Register</button>
            <button type="button" class="btn-primary" onclick="window.relocation.reload()">Refresh</button>
    </div>



    <script src="main.js"></script>
</body>
</html>
